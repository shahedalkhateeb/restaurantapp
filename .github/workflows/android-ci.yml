name: Android CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run Lint
        run: ./gradlew lint

      - name: Run Detekt
        run: ./gradlew detekt

  # 🔹 اختبارات JUnit
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-check
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

  instrumented-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      matrix:
        api-level: [28, 30, 33]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run Instrumented Tests
        run: ./gradlew connectedDebugAndroidTest

  build-apk:
    runs-on: ubuntu-latest
    needs: instrumented-tests
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ matrix.api-level }}
          path: app/build/outputs/apk/debug/app-debug.apk

  reports:
    runs-on: ubuntu-latest
    needs: build-apk
    steps:
      - uses: actions/checkout@v4
      - name: Generate Test Reports
        run: ./gradlew jacocoTestReport
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/

